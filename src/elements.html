<!DOCTYPE html>
<html lang="zh-Hant">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>元素力量 | Ninjago Archive</title>
    <!-- Paths use ../ because this file is in src/ (one level below root) -->
    <link rel="stylesheet" href="../css/common.css">
    <link rel="stylesheet" href="../css/elements.css">
    <link rel="stylesheet" href="../css/search.css">
</head>

<body>

    <header>
        <nav class="navbar">
            <!-- Logo path: go up one level to reach img/ -->
            <div class="logo"><img src="../img/lego-ninjago-logo.png" alt="Ninjago Archive Logo" height="80px"></div>
            <ul class="nav-links">
                <!-- Global search toggle (magnifying glass) — first item in nav -->
                <li class="search-wrapper">
                    <button class="search-toggle" type="button" aria-label="搜尋">
                        <svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="7"/><line x1="16.65" y1="16.65" x2="21" y2="21"/></svg>
                    </button>
                    <div class="search-input-wrap">
                        <input class="search-input" type="text" placeholder="搜尋角色、事件、集數…" aria-label="搜尋關鍵字">
                    </div>
                </li>
                <!-- index.html is at root, so use ../ ; other pages are in same src/ folder -->
                <li><a href="../index.html">首頁</a></li>
                <li><a href="timeline.html">時間線</a></li>
                <li><a href="world.html">世界觀</a></li>
                <li><a href="http://127.0.0.1:8000/characters/">角色</a></li>
                <li><a class="active" href="elements.html">元素力量</a></li>
            </ul>
        </nav>
    </header>

    <section class="section elements-section">
        <h1 class="page-title">來源龍與元素力量體系</h1>
        <div class="source-orbit-stage" aria-label="來源龍徽章輪播">
            <div class="source-orbit-track" data-orbit-track>
                <div class="source-lane" data-source-lane>
                <button class="source-badge is-active" type="button" data-source="motion">
                    <img src="../img/Element/motion.png" alt="動態 Source 徽章">
                    <span>動態</span>
                </button>

                <button class="source-badge" type="button" data-source="energy">
                    <img src="../img/Element/energy.png" alt="能量 Source 徽章">
                    <span>能量</span>
                </button>

                <button class="source-badge" type="button" data-source="strength">
                    <img src="../img/Element/strength.png" alt="力量 Source 徽章">
                    <span>力量</span>
                </button>

                <button class="source-badge" type="button" data-source="life">
                    <img src="../img/Element/life.png" alt="生命 Source 徽章">
                    <span>生命</span>
                </button>

                <button class="source-badge" type="button" data-source="flow">
                    <img src="../img/Element/flow.png" alt="流動 Source 徽章">
                    <span>流動</span>
                </button>

                <button class="source-badge" type="button" data-source="focus">
                    <img src="../img/Element/focus.png" alt="專注 Source 徽章">
                    <span>專注</span>
                </button>

                <button class="source-badge" type="button" data-source="balance">
                    <img src="../img/Element/balance.png" alt="平衡 Source 徽章">
                    <span>平衡</span>
                </button>
                </div>
            </div>
        </div>

        <div class="source-detail-panel">
            <article class="source-panel is-active" data-source-panel="motion">
                <h2>動態元素</h2>
                <div class="element-list">
                    <div class="element element-fire">火</div>
                    <div class="element element-speed">速度</div>
                    <div class="element element-sound">聲音</div>
                    <div class="element element-vibration">震動</div>
                    <div class="element element-shockwave">衝擊波</div>
                </div>
            </article>

            <article class="source-panel" data-source-panel="energy">
                <h2>能量元素</h2>
                <div class="element-list">
                    <div class="element element-lightning">閃電</div>
                    <div class="element element-thermal">熱能</div>
                    <div class="element element-light">光</div>
                </div>
            </article>

            <article class="source-panel" data-source-panel="strength">
                <h2>力量元素</h2>
                <div class="element-list">
                    <div class="element element-earth">土</div>
                    <div class="element element-metal">金屬</div>
                    <div class="element element-gravity">重力</div>
                    <div class="element element-tension">表面張力</div>
                    <div class="element element-cohesion">聚合</div>
                </div>
            </article>

            <article class="source-panel" data-source-panel="life">
                <h2>生命元素</h2>
                <div class="element-list">
                    <div class="element element-vitality">能量</div>
                    <div class="element element-nature">自然</div>
                    <div class="element element-poison">毒</div>
                    <div class="element element-plants">植物</div>
                    <div class="element element-size">體型</div>
                </div>
            </article>

            <article class="source-panel" data-source-panel="flow">
                <h2>流動元素</h2>
                <div class="element-list">
                    <div class="element element-water">水</div>
                    <div class="element element-time">時間</div>
                    <div class="element element-wind">風</div>
                    <div class="element element-smoke">煙霧</div>
                    <div class="element element-shapeshift">變形</div>
                </div>
            </article>

            <article class="source-panel" data-source-panel="focus">
                <h2>專注元素</h2>
                <div class="element-list">
                    <div class="element element-ice">冰</div>
                    <div class="element element-mind">心靈</div>
                    <div class="element element-reflection">反射</div>
                    <div class="element element-illusion">幻影</div>
                    <div class="element element-tech">科技</div>
                </div>
            </article>

            <article class="source-panel" data-source-panel="balance">
                <h2>平衡元素</h2>
                <div class="element-list">
                    <div class="element element-balance">平衡</div>
                    <div class="element element-shadow">暗影</div>
                    <div class="element element-amber">琥珀</div>
                </div>
            </article>
        </div>
    </section>
    <footer>
        <p>© 2026 Ninjago Archive Project</p>
    </footer>

    <!-- Page-specific JavaScript -->
    <script src="../action/elements.js"></script>
    <script src="../action/search.js"></script>
</body>

</html>
